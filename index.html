<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="refresh" content="2;url=https://121.42.12.150:3443/">
  <title>通通甩掉 ✨ 正在跳转...</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: #fff;
      overflow: hidden;
    }

    .container {
      text-align: center;
      animation: fadeIn 0.8s ease;
    }

    .emoji {
      font-size: 80px;
      animation: shake 1.2s ease-in-out infinite;
      display: inline-block;
      margin-bottom: 20px;
    }

    @keyframes shake {
      0%, 100% { transform: rotate(0deg) scale(1); }
      15% { transform: rotate(-12deg) scale(1.1); }
      30% { transform: rotate(10deg) scale(1.1); }
      45% { transform: rotate(-8deg) scale(1.05); }
      60% { transform: rotate(6deg) scale(1.05); }
      75% { transform: rotate(-3deg); }
    }

    h1 {
      font-size: 2.2rem;
      font-weight: 700;
      margin-bottom: 12px;
      letter-spacing: 2px;
    }

    p {
      font-size: 1.1rem;
      opacity: 0.85;
      margin-bottom: 30px;
    }

    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .url {
      margin-top: 24px;
      font-size: 0.9rem;
      opacity: 0.6;
      word-break: break-all;
      padding: 0 20px;
    }

    .url a {
      color: #ffd6ff;
      text-decoration: underline;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* 粒子背景 */
    .particles {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: -1;
    }
    .particle {
      position: absolute;
      border-radius: 50%;
      background: rgba(255,255,255,0.15);
      animation: float linear infinite;
    }
    @keyframes float {
      0%   { transform: translateY(100vh) scale(0); opacity: 0; }
      10%  { opacity: 1; }
      90%  { opacity: 1; }
      100% { transform: translateY(-10vh) scale(1); opacity: 0; }
    }
  </style>
</head>
<body>

<div class="particles" id="particles"></div>

<div class="container">
  <div class="emoji">🐾</div>
  <h1>通通甩掉</h1>
  <p>轻轻一抖，烦恼全走 ✨</p>
  <div class="spinner"></div>
  <p style="margin-top:16px; font-size:0.95rem; opacity:0.7;">正在跳转至应用页面...</p>
  <div class="url">
    如未自动跳转，请手动访问：
    <a href="https://121.42.12.150:3443/" style="color:#ffd6ff;">https://121.42.12.150:3443/</a>
  </div>
</div>

<script>
  // 粒子动画
  const container = document.getElementById('particles');
  for (let i = 0; i < 20; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const size = Math.random() * 20 + 5;
    p.style.width = size + 'px';
    p.style.height = size + 'px';
    p.style.left = Math.random() * 100 + '%';
    p.style.animationDuration = (Math.random() * 8 + 6) + 's';
    p.style.animationDelay = (Math.random() * 5) + 's';
    container.appendChild(p);
  }

  // 3秒后强制跳转（防 meta 失效）
  setTimeout(function() {
    window.location.href = 'https://121.42.12.150:3443/';
  }, 3000);
</script>

</body>
</html>
